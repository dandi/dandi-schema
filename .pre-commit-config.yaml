# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Each migration-playbook demo exhibit keeps its source schemas and their raw
# `gen-pydantic` / `gen-json-schema` output under a `schemas/` folder, kept for
# reference. Treat that whole folder as generated/reference material — don't lint
# or reformat it (e.g. flake8 F401 on the generator's fixed import block). New
# exhibits following the `schemas/` convention are covered automatically.
exclude: 'migration_to_linkml_playbook/.*/schemas/'

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
    -   id: black
-   repo: https://github.com/PyCQA/isort
    rev: 9.0.0b1
    hooks:
    -   id: isort
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
    -   id: codespell
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
