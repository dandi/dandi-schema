      to be supported.'
    required: true
  disorder:
    description: Any current diagnosed disease or disorder associated with the
      participant or subject.
    range: Disorder
    required: false
    multivalued: true
  doi:
    title: DOI
    ifabsent: string()
    range: string
    required: false
    pattern: ^(10\.\d{4,}/[a-z][-a-z]*\.\d{6}/\d+\.\d+\.\d+|)$
  dxdate:
    description: Dates of diagnosis
    title: Dates of diagnosis
    range: Any
