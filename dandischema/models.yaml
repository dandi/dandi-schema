classes:
  Any:
    description: Any object
    class_uri: linkml:Any
  AccessRequirements:
    description: Information about access options for the dataset
    is_a: DandiBaseModel
    slots:
    - contactPoint
    - description
    - embargoedUntil
    - status
    slot_usage:
      contactPoint:
        description: Who or where to look for information about access.
      description:
        description: Information about access requirements when embargoed or
          restricted
        required: false
  Activity:
    description: Information about the Project activity
    is_a: DandiBaseModel
    slots:
    - description
    - endDate
    - identifier
    - name
    - startDate
    - used
    - wasAssociatedWith
    slot_usage:
      description:
        description: The description of the activity.
        required: false
      identifier:
        range: string
        required: false
      name:
        description: The name of the activity.
        title: Title
        required: true
        all_of:
        - pattern: ^[\s\S]{,150}\Z
  Affiliation:
    is_a: DandiBaseModel
    slots:
    - identifier
    - name
    slot_usage:
      identifier:
        description: Use an ror.org identifier for institutions.
        title: A ror.org identifier
        range: string
        required: false
        pattern: ^https://ror.org/[a-z0-9]+$
      name:
        description: Name of organization
        required: true
  Agent:
    is_a: DandiBaseModel
    slots:
    - identifier
    - name
    - url
    slot_usage:
      identifier:
        description: Identifier for an agent.
        title: Identifier
        range: string
        required: false
      name:
        required: true
      url:
        notes:
        - 'pydantic2linkml: Unable to translate the logic contained in the wrap validation
          function, <function _BaseUrl.__get_pydantic_core_schema__.<locals>.wrap_val
          at 0xADDRESS>.'
        required: false
  Allele:
    is_a: DandiBaseModel
    slots:
    - alleleSymbol
    - alleleType
    - identifier
    slot_usage:
      identifier:
        description: Identifier for genotyping allele.
        range: Any
        required: true
        any_of:
        - range: string
        - range: string
          multivalued: true
  Anatomy:
    description: UBERON or other identifier for anatomical part studied
    is_a: BaseType
  ApproachType:
    description: Identifier for approach used
    is_a: BaseType
  AssayType:
