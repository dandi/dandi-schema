  hasMember:
    range: string
    required: false
    multivalued: true
  id:
    range: string
  identifier: {}
  includeInCitation:
    title: Include contributor in citation
    range: boolean
    required: false
  keywords:
    description: Keywords used to describe this content.
    range: string
    required: false
    multivalued: true
  license:
    description: Licenses associated with the item. DANDI only supports a subset
      of Creative Commons Licenses (creativecommons.org) applicable to datasets.
    range: LicenseType
    multivalued: true
  locus:
    description: Locus at which information was extracted.
    range: Locus
    required: true
  locusType:
    range: string
    required: false
  manifestLocation:
    notes:
    - 'pydantic2linkml: Unable to translate the logic contained in the wrap validation
