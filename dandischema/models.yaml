slots:
  about:
    description: The subject matter of the content, such as disorders, brain
      anatomy.
    title: Subject matter of the dataset
    range: Any
    required: false
    multivalued: true
    any_of:
    - range: Disorder
    - range: Anatomy
    - range: GenericType
  access:
    title: Access information
    range: AccessRequirements
    required: false
    multivalued: true
  acknowledgement:
    description: Any acknowledgments not covered by contributors or external
      resources.
    range: string
    required: false
  affiliation:
    description: An organization that this person is affiliated with.
    range: Affiliation
    required: false
    multivalued: true
  age:
    description: A representation of age using ISO 8601 duration. This should
      include a valueReference if anything other than date of birth is used.
    range: PropertyValue
    required: false
  alleles:
    description: Information about alleles at the locus.
    range: Allele
    required: true
    multivalued: true
  alleleSymbol:
    range: string
    required: false
  alleleType:
    range: string
    required: false
  altName:
    range: string
    required: false
    multivalued: true
  anatomy:
    description: Identifier for what organ the sample belongs to. Use the most
      specific descriptor from sources such as UBERON.
    range: Anatomy
    required: false
    multivalued: true
  approach:
    range: ApproachType
    required: false
    multivalued: true
  assayType:
    description: Identifier for the assay(s) used (e.g., OBI).
    range: AssayType
    required: false
    multivalued: true
  assetsSummary:
    range: AssetsSummary
    required: true
  awardNumber:
    description: Identifier associated with a sponsored or gift award.
    title: Identifier for an award
    range: string
    required: false
  blobDateModified:
    title: Asset file modification date and time.
    range: datetime
    required: false
  cellLine:
    description: Cell line associated with the participant or subject.
    range: string
    required: false
  citation:
    range: string
    required: true
  contactPoint:
    range: ContactPoint
    required: false
  contentSize:
    notes:
    - 'pydantic2linkml: Unable to translate the logic contained in the after validation
      function, <bound method ByteSize._validate of <class ''pydantic.types.ByteSize''>>.'
    range: Any
    required: true
    any_of:
    - range: string
      pattern: ^\s*(\d*\.?\d+)\s*(\w+)?
    - range: integer
      minimum_value: 0
  contentUrl:
    notes:
    - 'pydantic2linkml: Unable to translate the logic contained in the wrap validation
      function, <function _BaseUrl.__get_pydantic_core_schema__.<locals>.wrap_val
      at 0xADDRESS>.'
    range: uri
    required: true
    multivalued: true
    pattern: ^(?i:http|https)://[^\s]+$
  contributor:
    range: Any
    multivalued: true
    any_of:
    - notes:
      - 'pydantic2linkml: Unable to translate the logic contained in the after validation
        function, <function Contributor.ensure_contact_person_has_email at 0xADDRESS>.'
      range: Person
    - notes:
      - 'pydantic2linkml: Unable to translate the logic contained in the after validation
        function, <function Contributor.ensure_contact_person_has_email at 0xADDRESS>.'
      range: Organization
  dataStandard:
    range: StandardsType
    required: false
    multivalued: true
  dataType:
    notes:
    - 'pydantic2linkml: Unable to translate the logic contained in the wrap validation
      function, <function _BaseUrl.__get_pydantic_core_schema__.<locals>.wrap_val
      at 0xADDRESS>.'
    range: uri
    required: false
    pattern: ^(?i:http|https)://[^\s]+$
  dateCreated:
    title: Dandiset creation date and time.
    range: datetime
    required: false
  dateModified:
    range: datetime
    required: false
  datePublished:
    range: datetime
    required: true
  description:
    range: string
  digest:
    title: A map of dandi digests to their values
    notes:
    - 'pydantic2linkml: Unable to translate the logic contained in the after validation
      function, <bound method BareAsset.digest_check of <class ''dandischema.models.BareAsset''>>.'
