[tox]
envlist = lint,typing,py3
isolated_build = True

[testenv]
# Install editable so the measured source is the in-repo tree rather than the
# copy under the venv's site-packages.  Without this, coverage's `source =
# dandischema` resolves to the working tree while the package actually executes
# from site-packages, so no source module is measured and Codecov reports 0%
# coverage for everything but the test files.
usedevelop = true
extras = test
passenv =
    DANDI_*
    DATACITE_DEV_LOGIN
    DATACITE_DEV_PASSWORD
    NO_ET
commands =
    pytest -v {posargs}

[testenv:lint]
skip_install = true
deps =
    codespell~=2.0
    flake8
commands =
    codespell dandischema
    flake8 {posargs} dandischema

[testenv:typing]
deps =
    mypy
    types-jsonschema
    types-requests
extras = test
commands =
    mypy dandischema

[pytest]
# --import-mode=importlib avoids ImportPathMismatchError when the package
# (including dandischema/tests/) is also installed into the tox venv and the
# pytest plugin (registered via [project.entry-points.pytest11]) eagerly
# imports `dandischema` from site-packages.
addopts = --cov=dandischema --tb=short --durations=10 --import-mode=importlib
filterwarnings =
    error
    # <https://github.com/dateutil/dateutil/issues/1284>
    ignore:.*utcfromtimestamp.* is deprecated:DeprecationWarning:dateutil

[coverage:run]
parallel = True
source = dandischema
